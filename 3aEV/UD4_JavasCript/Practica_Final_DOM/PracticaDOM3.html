<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Práctica de Manipulación del DOM</title>
</head>
<body>
  <h1>Práctica de Manipulación del DOM</h1>

  <!-- Párrafos -->
  <p id="parrafo1">Párrafo 1: Aprende a manipular elementos.</p>
  <p id="parrafo2">Párrafo 2: Segundo párrafo de ejemplo.</p>

  <!-- Lista -->
  <ul id="lista">
    <li>Elemento A</li>
    <li>Elemento B</li>
    <li>Elemento C</li>
  </ul>

  <!-- Inputs -->
  <input type="text" id="inputTexto" placeholder="Escribe algo">
  <input type="number" id="inputNumero" placeholder="Número">

  <!-- Tabla -->
  <table id="tabla">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Edad</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Alice</td>
        <td>25</td>
      </tr>
      <tr>
        <td>Bob</td>
        <td>30</td>
      </tr>
    </tbody>
  </table>

  <!-- Imagen -->
  <img id="imagen" src="https://portal.edu.gva.es/ieselgrao/wp-content/uploads/sites/1394/2023/04/grao-gif.gif" alt="Imagen de ejemplo">

  <!-- Enlace -->
  <a id="enlace" href="https://example.com" target="_blank">Ir a Example.com</a>

  <!-- Botones para cada ejercicio -->
  <div>
    <button id="btnEj1">Ejercicio 1</button>
    <button id="btnEj2">Ejercicio 2</button>
    <button id="btnEj3">Ejercicio 3</button>
    <button id="btnEj4">Ejercicio 4</button>
    <button id="btnEj5">Ejercicio 5</button>
    <button id="btnEj6">Ejercicio 6</button>
    <button id="btnEj7">Ejercicio 7</button>
    <button id="btnEj8">Ejercicio 8</button>
    <button id="btnEj9">Ejercicio 9</button>
    <button id="btnEj10">Ejercicio 10</button>
  </div>

  <script src="PracticaDOM3.js" defer></script>
</body>
</html>
